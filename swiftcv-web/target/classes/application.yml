server:
  port: 8989
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/my_chicken?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  redis:
    host: 127.0.0.1
    port: 6379
    database: 0
    timeout: 10000ms
    jedis:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: -1ms

mybatis-plus:
  type-aliases-package: com.gs.swiftcv.repository.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

kitchen:
  ai:
    enabled: false
    api-key:
    endpoint: https://api.openai.com/v1/chat/completions
    model: gpt-4o-mini
    timeout-ms: 8000

logging:
  level:
    com.gs.swiftcv: debug
    org.springframework: info
